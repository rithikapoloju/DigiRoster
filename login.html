 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiRoster Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <div class="left-section">
            <h1>Welcome to DigiRoster</h1>
            <p>Streamline your attendance and scheduling with DigiRoster. Access your account to manage your roster effectively.</p>
        </div>
        <div class="right-section">
            <h2>USER LOGIN</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="rollNo">Roll No</label>
                    <input type="text" id="rollNo" name="rollNo" placeholder="Enter your Roll No">
                    <div class="error-message" id="rollNoError"></div>
                </div>
                <div class="form-group">
                    <label for="email">Email ID</label>
                    <input type="email" id="email" name="email" placeholder="Enter your Email ID">
                    <div class="error-message" id="emailError"></div>
                </div>
                <div class="remember-forgot">
                    <label>
                        <input type="checkbox" name="remember"> Remember me
                    </label>
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="login-button">LOGIN</button>
            </form>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
