<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance</title>
    <link rel="stylesheet" href="mark_attendance.css">
</head>
<body>
    <div class="container">
        <h1>Mark Your Attendance</h1>
        <div class="form-group">
            <label for="rollNo">Roll Number:</label>
            <input type="text" id="rollNo" name="rollNo" placeholder="Enter your Roll Number">
        </div>
        <div class="form-group">
            <label for="rosterCode">Roster Code:</label>
            <input type="text" id="rosterCode" name="rosterCode" placeholder="Enter the Roster Code">
        </div>
        <div id="timer">Time remaining: <span id="countdown">60</span> seconds</div>
        <button id="markAttendanceBtn">Mark Attendance</button>
        <div id="message"></div>
        </div>

    <script src="mark_attendance.js"></script>
</body>
</html>
